<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bronx — master guide</title>
    <link rel="icon" type="image/png" href="avatar.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --border: #2a2a2a;
            --success: #3ba55c;
            --warning: #faa61a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
            max-height: calc(100vh - 4rem);
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .logo span {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 400;
        }

        .search-box {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.875rem;
        }

        .nav-section {
            margin-bottom: 1.5rem;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .nav-item .emoji {
            font-size: 1.125rem;
            width: 24px;
            text-align: center;
        }

        .nav-item .label {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .nav-item .badge {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Main content */
        .main {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .content-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .content-header .emoji {
            font-size: 1.75rem;
        }

        .content-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .content-header .description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-left: auto;
        }

        .content-body {
            padding: 2rem;
        }

        .page-content {
            max-width: 800px;
        }

        .page-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .page-content p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.7;
        }

        .page-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .page-content code {
            background: var(--bg-tertiary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.875em;
            color: var(--accent);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .pagination button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.15s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .page-indicator {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Search results */
        .search-results {
            padding: 2rem;
        }

        .search-result-item {
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .search-result-item:hover {
            background: var(--border);
        }

        .search-result-item h4 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .search-result-item .context {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .search-result-item mark {
            background: var(--accent);
            color: white;
            padding: 0 0.2em;
            border-radius: 2px;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .sidebar {
                position: relative;
                top: 0;
                max-height: none;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .content-header .description {
                margin-left: 0;
                margin-top: 0.5rem;
            }
        }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .loading::after {
            content: "";
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin-left: 1rem;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <img src="avatar.png" alt="bronx">
                <div>
                    <h1>bronx</h1>
                    <span>master guide</span>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="search the guide...">
            </div>

            <nav id="nav-sections">
                <div class="loading">loading guide...</div>
            </nav>
        </aside>

        <main class="main" id="main-content">
            <div class="loading">loading...</div>
        </main>
    </div>

    <script>
        // Guide data will be embedded here or fetched from API
        let guideData = null;
        let currentSection = 0;
        let currentPage = 0;

        // Fetch guide data from API
        async function loadGuide() {
            try {
                const response = await fetch('/api/guide');
                guideData = await response.json();
                renderNavigation();
                showSection(0, 0);
            } catch (error) {
                console.error('Failed to load guide:', error);
                document.getElementById('nav-sections').innerHTML = 
                    '<p style="color: var(--text-muted); padding: 1rem;">failed to load guide data</p>';
            }
        }

        // Render navigation sidebar
        function renderNavigation() {
            const nav = document.getElementById('nav-sections');
            let html = '';

            // Group by category
            const categories = {
                'basics': { title: 'Getting Started', sections: [] },
                'economy': { title: 'Economy & Earning', sections: [] },
                'activities': { title: 'Activities', sections: [] },
                'progression': { title: 'Progression', sections: [] },
                'server': { title: 'Server Management', sections: [] }
            };

            guideData.sections.forEach((section, idx) => {
                const cat = categorize(section.name);
                categories[cat].sections.push({ ...section, idx });
            });

            for (const [key, cat] of Object.entries(categories)) {
                if (cat.sections.length === 0) continue;
                html += `<div class="nav-section">
                    <div class="nav-section-title">${cat.title}</div>`;
                for (const section of cat.sections) {
                    html += `<a class="nav-item" data-section="${section.idx}" onclick="showSection(${section.idx}, 0)">
                        <span class="emoji">${section.emoji}</span>
                        <span class="label">${section.name}</span>
                        <span class="badge">${section.pages.length}p</span>
                    </a>`;
                }
                html += '</div>';
            }

            nav.innerHTML = html;
        }

        // Categorize sections
        function categorize(name) {
            const n = name.toLowerCase();
            if (n.includes('getting started') || n.includes('advanced tips')) return 'basics';
            if (n.includes('economy') || n.includes('passive') || n.includes('gambling')) return 'economy';
            if (n.includes('fishing') || n.includes('mining') || n.includes('crafting') || n.includes('pet')) return 'activities';
            if (n.includes('level') || n.includes('skill') || n.includes('achievement') || n.includes('challenge') || n.includes('mastery')) return 'progression';
            if (n.includes('setup') || n.includes('moderation') || n.includes('command') || n.includes('tuning') || n.includes('anticheat')) return 'server';
            return 'basics';
        }

        // Show a section/page
        function showSection(sectionIdx, pageIdx) {
            currentSection = sectionIdx;
            currentPage = pageIdx;

            const section = guideData.sections[sectionIdx];
            const page = section.pages[pageIdx];

            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.querySelector(`.nav-item[data-section="${sectionIdx}"]`);
            if (activeNav) activeNav.classList.add('active');

            // Render content
            const content = formatContent(page.content);
            const totalPages = section.pages.length;

            document.getElementById('main-content').innerHTML = `
                <div class="content-header">
                    <span class="emoji">${section.emoji}</span>
                    <h2>${section.name}</h2>
                    <span class="description">${section.description}</span>
                </div>
                <div class="content-body">
                    <div class="page-content">
                        <h3>${page.title}</h3>
                        <div>${content}</div>
                    </div>
                    ${totalPages > 1 ? `
                        <div class="pagination">
                            <button onclick="prevPage()" ${pageIdx === 0 ? 'disabled' : ''}>
                                ◀ Previous
                            </button>
                            <span class="page-indicator">${pageIdx + 1} / ${totalPages}</span>
                            <button onclick="nextPage()" ${pageIdx === totalPages - 1 ? 'disabled' : ''}>
                                Next ▶
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Format markdown-like content to HTML
        function formatContent(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>')
                .replace(/^- /gm, '• ');
        }

        // Page navigation
        function prevPage() {
            if (currentPage > 0) {
                showSection(currentSection, currentPage - 1);
            }
        }

        function nextPage() {
            const section = guideData.sections[currentSection];
            if (currentPage < section.pages.length - 1) {
                showSection(currentSection, currentPage + 1);
            }
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 2) {
                showSection(currentSection, currentPage);
                return;
            }

            const results = [];
            guideData.sections.forEach((section, sectionIdx) => {
                section.pages.forEach((page, pageIdx) => {
                    const content = page.content.toLowerCase();
                    if (content.includes(query) || page.title.toLowerCase().includes(query)) {
                        // Find context around match
                        const idx = content.indexOf(query);
                        const start = Math.max(0, idx - 40);
                        const end = Math.min(content.length, idx + query.length + 40);
                        let context = '...' + page.content.substring(start, end) + '...';
                        
                        results.push({
                            sectionIdx,
                            pageIdx,
                            sectionName: section.name,
                            pageTitle: page.title,
                            emoji: section.emoji,
                            context
                        });
                    }
                });
            });

            if (results.length === 0) {
                document.getElementById('main-content').innerHTML = `
                    <div class="search-results">
                        <h3>No results for "${query}"</h3>
                        <p style="color: var(--text-muted)">try different keywords</p>
                    </div>`;
                return;
            }

            let html = `<div class="search-results">
                <h3>Search results for "${query}"</h3>`;
            
            results.slice(0, 10).forEach(r => {
                const highlighted = r.context.replace(
                    new RegExp(`(${query})`, 'gi'),
                    '<mark>$1</mark>'
                );
                html += `<div class="search-result-item" onclick="showSection(${r.sectionIdx}, ${r.pageIdx}); document.getElementById('search-input').value = '';">
                    <h4>${r.emoji} ${r.sectionName} → ${r.pageTitle}</h4>
                    <div class="context">${highlighted}</div>
                </div>`;
            });

            html += '</div>';
            document.getElementById('main-content').innerHTML = html;
        });

        // Initialize
        loadGuide();
    </script>
</body>
</html>
